<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status GeForce NOW - CloudGG</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252525;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            text-transform: uppercase;
        }
        .up { background-color: #76b900; color: black; } /* Verde NVIDIA */
        .down { background-color: #e53935; color: white; }
        .incidents {
            text-align: left;
            background: #333;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .incident-item { border-left: 4px solid #ff9800; padding-left: 10px; margin-bottom: 10px; }
        button {
            background-color: #76b900;
            border: none;
            padding: 10px 20px;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #5e9400; }
    </style>
</head>
<body>

<div class="container">
    <h2>GeForce NOW (CloudGG)</h2>
    <div id="status-container">Carregando status...</div>
    <div id="incident-list"></div>
    <button onclick="fetchStatus()">Atualizar Agora</button>
</div>

<script>
    async function fetchStatus() {
        const statusDiv = document.getElementById('status-container');
        const incidentDiv = document.getElementById('incident-list');
        
        try {
            const response = await fetch('https://status.cloud.gg/summary.json');
            const data = await response.json();
            
            // Status Geral
            const isUp = data.page.status === "UP";
            statusDiv.innerHTML = `
                <div class="status-badge ${isUp ? 'up' : 'down'}">
                    ${isUp ? '● Sistema Online' : '● Instabilidade Detectada'}
                </div>
                <p>URL: <a href="${data.page.url}" style="color: #76b900;">${data.page.url}</a></p>
            `;

            // Incidentes Ativos
            if (data.activeIncidents.length > 0) {
                let html = '<div class="incidents"><strong>Alertas Ativos:</strong><br><br>';
                data.activeIncidents.forEach(inc => {
                    html += `
                        <div class="incident-item">
                            <strong>${inc.name}</strong><br>
                            <small>Impacto: ${inc.impact} | Status: ${inc.status}</small>
                        </div>
                    `;
                });
                html += '</div>';
                incidentDiv.innerHTML = html;
            } else {
                incidentDiv.innerHTML = '<p style="color: #888;">Nenhum incidente crítico no momento.</p>';
            }

        } catch (error) {
            statusDiv.innerHTML = '<div class="status-badge down">Erro ao conectar</div>';
            console.error('Erro:', error);
        }
    }

    // Iniciar na carga da página
    fetchStatus();
</script>

</body>
</html>
